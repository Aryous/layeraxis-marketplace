# plan.lock.yaml Template (Orchestrator-owned bootstrap)
# Purpose: initialize global lock fields before creative phase starts.

density: standard # minimal | standard | full
style_guide: digital-rationalism # current default (single option in this plugin)
negative_prompt: "no neon, no cyberpunk, no heavy texture, no harsh shadow, no glossy reflection, no clutter, no photorealism, no high saturation, no English text on the image"
generation:
  # Render engine is routed by this field:
  #   gemini / gemini-* (e.g. gemini-3-pro-image-preview) -> Gemini image API (needs GOOGLE_API_KEY)
  #   codex / gpt-image-*                                  -> codex exec image_gen (needs codex CLI logged in)
  model: gemini-3-pro-image-preview # default; can be overridden via AUQ
  aspect_ratio: "16:9" # 1:1 | 3:4 | 4:3 | 9:16 | 16:9
  image_size: "2K" # 1K | 2K | 4K (gemini only; codex derives size from aspect_ratio)
created_at: "2026-02-15T00:00:00Z"
spec_version: v4
